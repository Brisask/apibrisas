services:
  postgres:
    image: postgres:15
    container_name: apibrisas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: apibrisas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - apibrisas_network

  redis:
    image: redis:7-alpine
    container_name: apibrisas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - apibrisas_network

volumes:
  postgres_data:
  redis_data:

networks:
  apibrisas_network:
    driver: bridge